.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:white;border-radius:10px;padding:13px;border-left:4px solid #ddd;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s}

.card-name{font-size:15px;font-weight:700;margin-bottom:6px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:500}
.empty{text-align:center;padding:48px;color:#bbb;font-size:15px}
footer{text-align:center;padding:20px;color:#bbb;font-size:11px;background:white;margin-top:8px}
@media(max-width:480px){.cards{grid-template-columns:1fr}}

  else if(currentFilter === '6') items = items.filter(i=>i.date.startsWith('2026-06'));
  else if(currentFilter !== 'all') items = items.filter(i=>i.tier === currentFilter);
  
  if(searchText) items = items.filter(i=>i.name.toLowerCase().includes(searchText));
  
  document.getElementById('stat-total').textContent = `共 ${items.length} 场`;
  
  const app = document.getElementById('app');
  if(!items.length){ app.innerHTML='<div class="empty">📭 没有匹配的场次</div>'; return; }
  
  // 按日期分组
  const groups = {};
  items.forEach(item=>{
    if(!groups[item.date]) groups[item.date]=[];
    groups[item.date].push(item);
  });
  
  let html = '';
  Object.keys(groups).sort().forEach(date=>{
    const list = groups[date];
    const [y,m,d] = date.split('-');
    const label = `${parseInt(m)}月${parseInt(d)}日（${getWeekday(date)}）`;
    html += `<div class="day-block">
      <div class="day-title">📅 ${label} <span class="cnt">${list.length}场</span></div>
      <div class="cards">`;
    list.forEach(item=>{
      const color = TIER_COLOR[item.tier] || '#95a5a6';
      const label = TIER_LABEL[item.tier] || item.tier;
      html += `<div class="card" style="border-left-color:${color}">
        <div class="card-name">${item.name}</div>
        <div class="card-meta">
          <span class="tag" style="background:${color}20;color:${color}">${label}</span>
          <span class="tag" style="background:#f0ebe4;color:#8b6940">${item.industry}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
