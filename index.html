/* 免责声明 */

/* 搜索模式切换 */

.mode-btn{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:#999;border-bottom:3px solid transparent;transition:all .2s}
.mode-btn.active{color:#b8960c;border-bottom-color:#b8960c}

/* 控制区 */
.controls{background:white;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:0;z-index:20}
.control-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.ctrl-input{flex:1;min-width:160px;padding:8px 14px;border:1.5px solid #e0d5c5;border-radius:20px;font-size:14px;outline:none}
.ctrl-input:focus{border-color:#b8960c}
select.ctrl-input{cursor:pointer;background:white}
.btn{padding:7px 14px;border-radius:20px;border:1.5px solid #e0d5c5;background:white;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn.active,.btn:hover{background:#b8960c;color:white;border-color:#b8960c}
.btn-clear{background:#f5f2ee;border-color:#ddd;color:#888}

/* 结果 */
.content{padding:10px 12px 32px}
.result-hint{background:#fff8e8;border:1px solid #f0d87a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5c00}

.day-block{margin-top:14px}

.day-title .cnt{font-size:11px;background:#b8960c;color:white;border-radius:10px;padding:1px 7px;font-weight:400}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}

.card{background:white;border-radius:10px;padding:12px 14px;border-left:4px solid #ddd;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card-name{font-size:15px;font-weight:700;margin-bottom:7px}
.card-meta{display:flex;gap:5px;flex-wrap:wrap}
.tag{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:500}

/* 买手视角：显示日期列表 */

.buyer-card-name{font-size:16px;font-weight:700;margin-bottom:8px}
.date-list{display:flex;flex-wrap:wrap;gap:6px}
.date-chip{background:#fdf6ed;color:#a0784d;border:1px solid #e8d5b5;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600}

.empty{text-align:center;padding:48px 24px;color:#bbb;font-size:15px}
footer{text-align:center;padding:18px;color:#bbb;font-size:11px;background:white;margin-top:8px;border-top:1px solid #eee}
@media(max-width:480px){.cards{grid-template-columns:1fr}}

const ALL_DATES = ["2026-05-01", "2026-05-02", "2026-05-03", "2026-05-04", "2026-05-05", "2026-05-06", "2026-05-07", "2026-05-08", "2026-05-09", "2026-05-10", "2026-05-11", "2026-05-12", "2026-05-13", "2026-05-14", "2026-05-15", "2026-05-16", "2026-05-17", "2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21", "2026-05-22", "2026-05-23", "2026-05-24", "2026-05-25", "2026-05-26", "2026-05-27", "2026-05-28", "2026-05-29", "2026-05-30", "2026-05-31"];
const TIER_COLOR = {"1000w+": "#c0392b", "500w-1000w": "#e67e22", "100-500w": "#f39c12", "50-100w": "#27ae60", "10-50w": "#2980b9", "10w-": "#95a5a6"};
const TIER_LABEL = {"1000w+": "💎 1000w+", "500w-1000w": "🥇 500-1000w", "100-500w": "🥈 100-500w", "50-100w": "🥉 50-100w", "10-50w": "📌 10-50w", "10w-": "🔰 10w以下"};

let currentMode = 'date';
let currentTier = 'all';

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('mode-date-btn').classList.toggle('active', mode==='date');
  document.getElementById('mode-buyer-btn').classList.toggle('active', mode==='buyer');
  document.getElementById('ctrl-date').style.display = mode==='date' ? '' : 'none';
  document.getElementById('ctrl-buyer').style.display = mode==='buyer' ? '' : 'none';
  if(mode==='date') render(); else renderBuyer();
}

function setTier(t, btn) {
  currentTier = t;
  document.querySelectorAll('#ctrl-date .btn:not(.btn-clear)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function clearDate() {
  document.getElementById('date-select').value = '';
  render();
}

function getWeekday(dateStr) {
  const days = ['日','一','二','三','四','五','六'];
  return '周' + days[new Date(dateStr).getDay()];
}

function makeCard(item) {
  const color = TIER_COLOR[item.tier] || '#95a5a6';
  const tlabel = TIER_LABEL[item.tier] || item.tier;
  return `<div class="card" style="border-left-color:${color}">
    <div class="card-name">${item.name}</div>
    <div class="card-meta">
      <span class="tag" style="background:${color}20;color:${color}">${tlabel}</span>
      <span class="tag" style="background:#f0ebe4;color:#8b6940">${item.industry}</span>
    </div>
  </div>`;
}

function render() {
  let items = ALL_DATA;
  const selectedDate = document.getElementById('date-select').value;
  
  if(selectedDate) items = items.filter(i=>i.date===selectedDate);
  if(currentTier !== 'all') items = items.filter(i=>i.tier===currentTier);
  
  document.getElementById('stat-total').textContent = `共 ${items.length} 场`;
  const app = document.getElementById('app');
  
  if(!items.length) {
    app.innerHTML = selectedDate 
      ? `<div class="empty">📭 ${parseInt(selectedDate.slice(5,7))}月${parseInt(selectedDate.slice(8,10))}日 暂无符合条件的开播场次</div>`
      : '<div class="empty">请选择日期查看开播买手</div>';
    return;
  }
  
  // 按日期分组
  const groups = {};
  items.forEach(item=>{ if(!groups[item.date]) groups[item.date]=[]; groups[item.date].push(item); });
  
  let hint = selectedDate ? '' : `<div class="result-hint">📋 显示全部 ${items.length} 场，请通过上方选择日期或分层筛选</div>`;
  let html = hint;
  
  Object.keys(groups).sort().forEach(date=>{
    const list = groups[date];
    const [,m,d] = date.split('-');
    html += `<div class="day-block">
      <div class="day-title">📅 ${parseInt(m)}月${parseInt(d)}日（${getWeekday(date)}）<span class="cnt">${list.length}场</span></div>
      <div class="cards">${list.map(makeCard).join('')}</div>
    </div>`;
  });
  
  app.innerHTML = html;
}

function renderBuyer() {
  const q = document.getElementById('buyer-search').value.trim();
  const app = document.getElementById('app');
  
  if(!q) {
    app.innerHTML = '<div class="empty">输入买手名称，查看Ta的所有开播日期</div>';
    return;
  }
  
  // 找到匹配的买手
  const matched = {};
  ALL_DATA.filter(i=>i.name.includes(q)).forEach(i=>{
    if(!matched[i.name]) matched[i.name] = {...i, dates:[]};
    matched[i.name].dates.push(i.date);
  });
  
  const results = Object.values(matched);
  document.getElementById('stat-total').textContent = `找到 ${results.length} 位买手`;
  
  if(!results.length) {
    app.innerHTML = `<div class="empty">📭 未找到"${q}"，请检查名称是否正确</div>`;
    return;
  }
  
  let html = '';
  results.forEach(item=>{
    const color = TIER_COLOR[item.tier] || '#95a5a6';
    const tlabel = TIER_LABEL[item.tier] || item.tier;
    html += `<div class="buyer-card">
      <div class="buyer-card-name">${item.name}</div>
      <div class="card-meta" style="margin-bottom:8px">
        <span class="tag" style="background:${color}20;color:${color}">${tlabel}</span>
        <span class="tag" style="background:#f0ebe4;color:#8b6940">${item.industry}</span>
      </div>
      <div class="date-list">
        ${item.dates.sort().map(d=>{
          const [,m,dd] = d.split('-');
          return `<span class="date-chip">${parseInt(m)}月${parseInt(dd)}日（${getWeekday(d)}）</span>`;
        }).join('')}
      </div>
    </div>`;
  });
  
  app.innerHTML = html;
}

// 初始化
render();
</script>
