  .date-badge { background: #fdf6ed; color: #a0784d; border: 1px solid #e8d5b5; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 600; white-space: nowrap; }

  .ddl-warn { color: #e74c3c !important; font-weight: 600; }

let currentMonth = 'all';
let searchText = '';

function filterMonth(month, btn) {
  currentMonth = month;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchText = this.value.toLowerCase();
  render();
});

function getDDLClass(ddl) {
  if (!ddl) return '';
  if (ddl.includes('已过')) return 'ddl-warn';
  return 'ddl-ok';
}

function render() {
  let items = SCHEDULE_DATA.items;
  
  if (currentMonth === 'jewelry') {
    items = items.filter(i => i.jewelry);
  } else if (currentMonth !== 'all') {
    items = items.filter(i => i.month === currentMonth);
  }
  
  if (searchText) {
    items = items.filter(i => 
      i.name.toLowerCase().includes(searchText) ||
      i.category.toLowerCase().includes(searchText) ||
      i.am.toLowerCase().includes(searchText)
    );
  }

  const app = document.getElementById('app');
  
  if (items.length === 0) {
    app.innerHTML = '<div class="empty">📭 没有找到匹配的场次</div>';
    return;
  }

  // 按月份分组
  const groups = {};
  items.forEach(item => {
    const key = item.month === '5' ? '5月场次' : '6月场次';
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  let html = '';
  for (const [title, list] of Object.entries(groups)) {
    html += `<div class="month-section">
      <div class="month-title">📅 ${title} <span class="count">${list.length}场</span></div>`;
    list.forEach(item => {
      const ddlClass = getDDLClass(item.ddl);
      html += `<div class="card">
        <div class="card-header">
          <div class="buyer-name">${item.name}</div>
          <div class="date-badge">${item.date}</div>
        </div>
        <div style="margin-bottom:8px;">
          <span class="tag">${item.type}</span>
          ${item.jewelry ? '<span class="tag jewelry">💎 珠宝相关</span>' : ''}
        </div>
        <div class="row"><span class="label">粉丝</span><span class="value">${item.fans}</span></div>
        <div class="row"><span class="label">画像</span><span class="value">${item.audience}</span></div>
        <div class="row"><span class="label">招商类目</span><span class="value">${item.category}</span></div>
        <div class="row"><span class="label">合作条件</span><span class="value">${item.condition}</span></div>
        ${item.ddl ? `<div class="row"><span class="label">提报截止</span><span class="value ${ddlClass}">${item.ddl}</span></div>` : ''}
        <div class="row"><span class="label">负责AM</span><span class="value">${item.am}</span></div>
        ${item.link ? `<div class="row"><span class="label">招商表</span><span class="value"><a href="${item.link}" target="_blank">点击提报 →</a></span></div>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  app.innerHTML = html;
}

document.getElementById('updateTime').textContent = `最后更新：${SCHEDULE_DATA.updateTime}`;
render();
