<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦞 小龙武器库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#0f0f13;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:24px 32px;border-bottom:1px solid #2a2a3e}
.header h1{font-size:24px;font-weight:700;color:#fff}
.header p{color:#aaa;font-size:13px;margin-top:6px}
.stats{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,0.06);padding:8px 14px;border-radius:20px;font-size:12px;color:#ccc}
.stat span{color:#fff;font-weight:600}

.controls{padding:16px 32px;background:#13131a;border-bottom:1px solid #222;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;background:#1e1e2e;border:1px solid #333;border-radius:8px;padding:8px 14px;color:#fff;font-size:14px;outline:none}
.search-box::placeholder{color:#555}
.search-box:focus{border-color:#e95f8a}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:16px;border:1.5px solid #333;background:transparent;color:#aaa;font-size:12px;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:#e95f8a;color:#fff}
.fbtn.active{background:#e95f8a;border-color:#e95f8a;color:#fff}
.fbtn-all.active{background:#6366f1;border-color:#6366f1}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:20px 32px}

.card{background:#1a1a27;border:1px solid #2a2a3e;border-radius:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:#e95f8a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,95,138,0.15)}
.card.selected{border-color:#e95f8a;background:#1e1a2a}
.card-header{padding:14px 16px 10px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-name{font-size:13px;font-weight:600;color:#fff}
.card-freq{font-size:11px;padding:2px 8px;border-radius:10px;background:#2a2a3e;color:#aaa}
.card-freq.hot{background:rgba(233,95,138,0.2);color:#e95f8a}
.card-freq.used{background:rgba(99,102,241,0.2);color:#818cf8}
.card-freq.potential{background:rgba(16,185,129,0.2);color:#34d399}
.card-freq.delete{background:rgba(239,68,68,0.2);color:#f87171}
.card-tag{font-size:10px;margin-bottom:6px;color:#888}
.card-desc{font-size:12px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.detail-panel{position:fixed;right:0;top:0;height:100vh;width:420px;background:#14141e;border-left:1px solid #2a2a3e;padding:28px 24px;overflow-y:auto;transform:translateX(100%);transition:transform .25s;z-index:100}
.detail-panel.open{transform:translateX(0)}
.detail-close{position:absolute;top:16px;right:16px;background:#2a2a3e;border:none;color:#aaa;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:#e95f8a;color:#fff}
.detail-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.detail-slug{font-size:11px;color:#666;font-family:monospace;background:#1e1e2e;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:14px}
.detail-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;margin-bottom:16px}
.detail-section{margin-bottom:18px}
.detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:8px}
.detail-section p{font-size:13px;color:#bbb;line-height:1.6}
.trigger-box{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:8px;padding:12px;font-size:12px;color:#e95f8a;line-height:1.6;font-style:italic}
.use-btn{width:100%;padding:12px;background:linear-gradient(135deg,#e95f8a,#c2185b);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.use-btn:hover{opacity:.85}
.copy-hint{font-size:11px;color:#555;text-align:center;margin-top:6px}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:#555}
.no-results h3{font-size:18px;margin-bottom:8px;color:#666}

.tag-hot{color:#e95f8a}
.tag-used{color:#818cf8}
.tag-potential{color:#34d399}
.tag-delete{color:#f87171}
.tag-idle{color:#555}
.tag-low{color:#f59e0b}
</style>
</head>
<body>
<div class="header">
  <h1>🦞 小龙武器库 · 18般武艺全览</h1>
  <p>点击卡片查看详情 · 知道怎么用 · 用对工具</p>
  <div class="stats">
    <div class="stat">总计 <span id="total-count">-</span> 个Skill</div>
    <div class="stat">🔥 高频核心 <span id="hot-count">-</span> 个</div>
    <div class="stat">💡 高潜未用 <span id="potential-count">-</span> 个</div>
    <div class="stat">🗑️ 建议删除 <span id="delete-count">-</span> 个</div>
  </div>
</div>
<div class="controls">
  <input class="search-box" id="search" placeholder="🔍 搜索技能名称或功能描述..." oninput="render()">
  <div class="filter-btns">
    <button class="fbtn fbtn-all active" data-tag="all" onclick="setTag('all',this)">全部</button>
    <button class="fbtn" data-tag="hot" onclick="setTag('hot',this)">🔥 高频核心</button>
    <button class="fbtn" data-tag="used" onclick="setTag('used',this)">✅ 常用</button>
    <button class="fbtn" data-tag="low" onclick="setTag('low',this)">📊 低频</button>
    <button class="fbtn" data-tag="potential" onclick="setTag('potential',this)">💡 高潜未用</button>
    <button class="fbtn" data-tag="idle" onclick="setTag('idle',this)">😴 未使用</button>
    <button class="fbtn" data-tag="delete" onclick="setTag('delete',this)">🗑️ 建议删除</button>
  </div>
</div>
<div class="grid" id="grid"></div>

<div class="detail-panel" id="detail">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

let currentTag = 'all';
let currentSearch = '';

function setTag(tag, el) {
  currentTag = tag;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  currentSearch = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = SKILLS.filter(s => {
    if (currentTag !== 'all' && s.tag !== currentTag) return false;
    if (currentSearch) {
      const hay = (s.name + s.desc + s.trigger).toLowerCase();
      if (!hay.includes(currentSearch)) return false;
    }
    return true;
  });
  
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results"><h3>😕 没找到匹配的技能</h3><p>换个关键词试试</p></div>';
    return;
  }
  
  grid.innerHTML = filtered.map(s => `
    <div class="card" onclick="showDetail('${s.name.replace(/'/g,"\\'")}')">
      <div class="card-header">
        <div class="card-top">
          <div class="card-name">${s.name}</div>
          <div class="card-freq ${s.tag}">${s.freq > 0 ? s.freq+'次' : s.tag === 'potential' ? '待发现' : s.tag === 'delete' ? '建议删' : '未使用'}</div>
        </div>
        <div class="card-tag ${s.tag ? 'tag-'+s.tag : ''}">${s.tag_label}</div>
        <div class="card-desc">${s.desc || '暂无描述'}</div>
      </div>
    </div>
  `).join('');
}

function showDetail(name) {
  const s = SKILLS.find(x => x.name === name);
  if (!s) return;
  
  const freqText = s.freq > 0 ? `近60天使用 ${s.freq} 次` : '近60天未触发';
  const badgeStyle = {
    hot: 'background:rgba(233,95,138,0.2);color:#e95f8a',
    used: 'background:rgba(99,102,241,0.2);color:#818cf8',
    low: 'background:rgba(245,158,11,0.2);color:#f59e0b',
    potential: 'background:rgba(16,185,129,0.2);color:#34d399',
    idle: 'background:rgba(100,100,100,0.2);color:#888',
    delete: 'background:rgba(239,68,68,0.2);color:#f87171',
  }[s.tag] || '';
  
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-name">${s.name}</div>
    <div class="detail-slug">${s.name}</div>
    <div class="detail-badge" style="${badgeStyle}">${s.tag_label} · ${freqText}</div>
    
    <div class="detail-section">
      <h4>📋 能做什么</h4>
      <p>${s.desc || '暂无描述'}</p>
    </div>
    
    ${s.trigger ? `<div class="detail-section">
      <h4>💬 怎么触发（直接发给我）</h4>
      <div class="trigger-box">${s.trigger}</div>
    </div>` : ''}
    
    <div class="detail-section">
      <h4>🚀 立即使用</h4>
      <button class="use-btn" onclick="copyTrigger('${s.name}','${(s.trigger||'').replace(/'/g,"\\'").replace(/\n/g,' ')}')">
        📋 复制使用提示词
      </button>
      <p class="copy-hint">复制后直接粘贴发给我就能触发</p>
    </div>
  `;
  document.getElementById('detail').classList.add('open');
}

function copyTrigger(name, trigger) {
  const text = trigger || name;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.use-btn');
    btn.textContent = '✅ 已复制！';
    setTimeout(() => btn.textContent = '📋 复制使用提示词', 1500);
  });
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

// 统计
document.getElementById('total-count').textContent = SKILLS.length;
document.getElementById('hot-count').textContent = SKILLS.filter(s=>s.tag==='hot').length;
document.getElementById('potential-count').textContent = SKILLS.filter(s=>s.tag==='potential').length;
document.getElementById('delete-count').textContent = SKILLS.filter(s=>s.tag==='delete').length;

render();
</script>
