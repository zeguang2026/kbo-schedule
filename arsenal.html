<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦞 小龙武器库 · 业务分类版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#0d0d14;color:#ddd;min-height:100vh}

.header{background:linear-gradient(135deg,#1a1028 0%,#0f1a2e 60%,#0a1f3a 100%);padding:28px 36px 20px;border-bottom:1px solid #1e1e30}
.header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px}
.header p{color:#888;font-size:13px;margin-top:5px}
.stats{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,0.05);border:1px solid #2a2a40;padding:6px 14px;border-radius:20px;font-size:12px;color:#aaa}
.stat b{color:#fff}

.search-wrap{padding:16px 36px;background:#0f0f1a;border-bottom:1px solid #1a1a28;display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.search{flex:1;min-width:220px;background:#1a1a28;border:1.5px solid #2a2a3e;border-radius:8px;padding:9px 14px;color:#fff;font-size:14px;outline:none;transition:border-color .15s}
.search:focus{border-color:#7c3aed}
.search::placeholder{color:#444}
.tag-filters{display:flex;gap:6px;flex-wrap:wrap}
.tf{padding:5px 13px;border-radius:14px;border:1.5px solid #2a2a3e;background:transparent;color:#888;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tf:hover{border-color:#7c3aed;color:#fff}
.tf.on{background:#7c3aed;border-color:#7c3aed;color:#fff}

.body{display:flex;min-height:calc(100vh - 130px)}
.sidebar{width:240px;flex-shrink:0;background:#0d0d14;border-right:1px solid #1a1a28;padding:16px 0;position:sticky;top:130px;height:calc(100vh - 130px);overflow-y:auto}
.nav-item{display:block;padding:9px 20px;font-size:12px;color:#777;cursor:pointer;border-left:2px solid transparent;transition:all .15s;text-decoration:none}
.nav-item:hover{color:#bbb;background:rgba(255,255,255,0.03)}
.nav-item.active{color:#fff;border-left-color:var(--c);background:rgba(255,255,255,0.05)}
.nav-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--c);margin-right:8px;vertical-align:middle}
.nav-count{float:right;background:rgba(255,255,255,0.08);padding:1px 7px;border-radius:8px;font-size:10px;color:#666}

.content{flex:1;padding:24px 28px;overflow-x:hidden}
.category{margin-bottom:36px}
.cat-header{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1a1a28;display:flex;align-items:center;gap:12px}
.cat-title{font-size:17px;font-weight:700;color:#fff}
.cat-desc{font-size:12px;color:#666;margin-top:3px}
.cat-line{height:3px;width:40px;border-radius:2px;background:var(--c)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#141421;border:1px solid #1e1e30;border-radius:10px;cursor:pointer;transition:all .18s;overflow:hidden}
.card:hover{border-color:var(--c);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4)}
.card.selected{border-color:var(--c);background:#17172a}
.card-inner{padding:13px 15px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.card-alias{font-size:13px;font-weight:600;color:#e8e8e8;line-height:1.3}
.card-freq{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.freq-high{background:rgba(233,95,138,0.2);color:#e95f8a}
.freq-mid{background:rgba(99,102,241,0.2);color:#818cf8}
.freq-low{background:rgba(245,158,11,0.2);color:#f59e0b}
.freq-zero{background:rgba(100,100,100,0.15);color:#666}
.freq-new{background:rgba(16,185,129,0.2);color:#34d399}
.card-scene{font-size:11.5px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.panel{position:fixed;right:0;top:0;height:100vh;width:400px;background:#12121e;border-left:1px solid #1e1e30;padding:0;overflow-y:auto;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column}
.panel.open{transform:translateX(0)}
.panel-head{padding:20px 22px 16px;border-bottom:1px solid #1e1e30;position:sticky;top:0;background:#12121e;z-index:10}
.panel-close{float:right;background:#1e1e30;border:none;color:#888;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:background .15s}
.panel-close:hover{background:#7c3aed;color:#fff}
.panel-name{font-size:17px;font-weight:700;color:#fff;padding-right:36px;line-height:1.3}
.panel-slug{font-family:monospace;font-size:10px;color:#555;background:#1a1a28;padding:2px 7px;border-radius:4px;margin-top:6px;display:inline-block}
.panel-body{padding:18px 22px;flex:1}
.panel-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:10px;font-size:11px;margin-bottom:18px}
.sec{margin-bottom:20px}
.sec-h{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#444;margin-bottom:8px}
.sec-p{font-size:13px;color:#bbb;line-height:1.65}
.trig-box{background:#1a1a28;border-left:3px solid #7c3aed;border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:#a78bfa;line-height:1.6;font-style:italic}
.use-btn{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.use-btn:hover{opacity:.85}
.copy-hint{font-size:10px;color:#555;text-align:center;margin-top:5px}

.no-r{grid-column:1/-1;text-align:center;padding:48px;color:#444}
.no-r h3{font-size:16px;color:#555;margin-bottom:6px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <h1>🦞 小龙武器库 · AM业务分类版</h1>
  <p>按业务场景分类 · 点击卡片查看用法 · 知道什么时候用什么</p>
  <div class="stats">
    <div class="stat">总计 <b id="sc">-</b> 个Skill</div>
    <div class="stat">🔥 高频（>20次）<b id="hc">-</b> 个</div>
    <div class="stat">💡 高潜未用 <b id="nc">-</b> 个</div>
    <div class="stat">🗑️ 建议清理 <b id="dc">-</b> 个</div>
  </div>
</div>
<div class="search-wrap">
  <input class="search" id="q" placeholder="🔍 搜索技能名称或功能…" oninput="render()">
  <div class="tag-filters">
    <button class="tf on" data-f="all" onclick="setF('all',this)">全部</button>
    <button class="tf" data-f="high" onclick="setF('high',this)">🔥 高频在用</button>
    <button class="tf" data-f="new" onclick="setF('new',this)">💡 值得发现</button>
    <button class="tf" data-f="unused" onclick="setF('unused',this)">😴 从未触发</button>
  </div>
</div>
<div class="body">
  <div class="sidebar" id="nav"></div>
  <div class="content" id="content"></div>
</div>
<div class="panel" id="panel">
  <div class="panel-head">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="ph"></div>
  </div>
  <div class="panel-body" id="pb"></div>
</div>

  'find-buy-point','kill-that-dirtywork','humanizer','redbi-new-merchant-monitor',
  'crm-ecommerce-tgmv-beta','data-visualization','live-reservation-insight',
  'merchant-lookup-general','report-generation','redbi-report-day-or-week']);

let currentF = 'all';

function setF(f, el) {
  currentF = f;
  document.querySelectorAll('.tf').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function freqClass(f, name) {
  if (f >= 20) return 'freq-high';
  if (f >= 6) return 'freq-mid';
  if (f > 0) return 'freq-low';
  if (HIGH_POTENTIAL.has(name)) return 'freq-new';
  return 'freq-zero';
}
function freqLabel(f, name) {
  if (f >= 20) return `🔥 ${f}次`;
  if (f >= 6) return `${f}次`;
  if (f > 0) return `${f}次`;
  if (HIGH_POTENTIAL.has(name)) return '💡 推荐';
  return '未使用';
}

function matchFilter(s) {
  if (currentF === 'high') return s.freq >= 10;
  if (currentF === 'new') return s.freq === 0 && HIGH_POTENTIAL.has(s.name);
  if (currentF === 'unused') return s.freq === 0 && !HIGH_POTENTIAL.has(s.name);
  return true;
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const nav = document.getElementById('nav');
  const content = document.getElementById('content');
  nav.innerHTML = '';
  content.innerHTML = '';

  CATS.forEach((cat, ci) => {
    const filtered = cat.skills.filter(s => {
      if (!matchFilter(s)) return false;
      if (q) return (s.alias + s.name + s.scene + (s.trigger||'')).toLowerCase().includes(q);
      return true;
    });
    if (!filtered.length) return;

    const navEl = document.createElement('a');
    navEl.className = 'nav-item';
    navEl.href = `#cat-${ci}`;
    navEl.style.setProperty('--c', cat.color);
    navEl.innerHTML = `<span class="nav-dot"></span>${cat.label.replace(/[🔍📊📝🎙️🤝💬📈📄⚙️🗑️] /,'')} <span class="nav-count">${filtered.length}</span>`;
    nav.appendChild(navEl);

    const sec = document.createElement('div');
    sec.className = 'category';
    sec.id = `cat-${ci}`;
    sec.style.setProperty('--c', cat.color);
    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-line"></div>
        <div>
          <div class="cat-title">${cat.label}</div>
          <div class="cat-desc">${cat.desc}</div>
        </div>
      </div>
      <div class="grid">${filtered.map(s => `
        <div class="card" style="--c:${cat.color}" onclick="showPanel('${s.name.replace(/'/g,"\\'")}','${cat.color}')">
          <div class="card-inner">
            <div class="card-top">
              <div class="card-alias">${s.alias}</div>
              <div class="card-freq ${freqClass(s.freq,s.name)}">${freqLabel(s.freq,s.name)}</div>
            </div>
            <div class="card-scene">${s.scene}</div>
          </div>
        </div>`).join('')}
      </div>`;
    content.appendChild(sec);
  });

  if (!content.children.length) {
    content.innerHTML = '<div class="no-r"><h3>😕 没找到</h3><p>换个关键词试试</p></div>';
  }
}

function showPanel(name, color) {
  let skill = null, cat = null;
  for (const c of CATS) {
    const s = c.skills.find(x => x.name === name);
    if (s) { skill = s; cat = c; break; }
  }
  if (!skill) return;

  const fc = freqClass(skill.freq, skill.name);
  const fl = freqLabel(skill.freq, skill.name);
  const badgeStyle = {
    'freq-high':'background:rgba(233,95,138,0.2);color:#e95f8a',
    'freq-mid':'background:rgba(99,102,241,0.2);color:#818cf8',
    'freq-low':'background:rgba(245,158,11,0.2);color:#f59e0b',
    'freq-new':'background:rgba(16,185,129,0.2);color:#34d399',
    'freq-zero':'background:rgba(100,100,100,0.15);color:#666',
  }[fc];

  document.getElementById('ph').innerHTML = `
    <div class="panel-name">${skill.alias}</div>
    <div class="panel-slug">${skill.name}</div>`;

  document.getElementById('pb').innerHTML = `
    <div class="panel-badge" style="${badgeStyle}">
      ${cat.label.split(' ')[0]} ${cat.label.split(' ').slice(1).join(' ')} · ${fl}
    </div>
    <div class="sec">
      <div class="sec-h">📋 适用场景</div>
      <div class="sec-p">${skill.scene}</div>
    </div>
    ${skill.trigger ? `<div class="sec">
      <div class="sec-h">💬 怎么触发（直接发给我）</div>
      <div class="trig-box">${skill.trigger}</div>
    </div>` : ''}
    <div class="sec">
      <div class="sec-h">🚀 立即使用</div>
      <button class="use-btn" onclick="copyIt('${skill.trigger ? skill.trigger.replace(/'/g,"\\'").replace(/\n/g,' ') : skill.alias}')">
        📋 复制触发词 · 粘贴发给我
      </button>
      <div class="copy-hint">直接粘贴到对话框发给我就能触发</div>
    </div>`;

  document.getElementById('panel').classList.add('open');
}

function copyIt(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.use-btn');
    btn.textContent = '✅ 已复制！';
    setTimeout(() => btn.textContent = '📋 复制触发词 · 粘贴发给我', 1500);
  });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// 统计
const allSkills = CATS.flatMap(c => c.skills);
document.getElementById('sc').textContent = allSkills.length;
document.getElementById('hc').textContent = allSkills.filter(s => s.freq >= 20).length;
document.getElementById('nc').textContent = allSkills.filter(s => s.freq === 0 && HIGH_POTENTIAL.has(s.name)).length;
document.getElementById('dc').textContent = (CATS.find(c=>c.id==='irrelevant')?.skills.length||0);

render();

// 滚动高亮导航
const ob = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.getAttribute('href') === '#'+id);
      });
    }
  });
}, {threshold:.2});
setTimeout(() => {
  document.querySelectorAll('.category').forEach(el => ob.observe(el));
}, 500);
</script>
</body>
</html>
